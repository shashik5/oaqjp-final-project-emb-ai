<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Emotion Detector – AI-Powered Sentiment Analysis</title>
  <meta name="description" content="Detect emotions in text using Watson NLP. Analyze anger, disgust, fear, joy, and sadness instantly." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a12;
      --surface: #13131f;
      --card: #1a1a2e;
      --border: rgba(255,255,255,0.08);
      --accent: #7c3aed;
      --accent2: #a78bfa;
      --text: #f1f0ff;
      --muted: #8b8ba7;
      --anger: #ef4444;
      --disgust: #22c55e;
      --fear: #f97316;
      --joy: #eab308;
      --sadness: #3b82f6;
      --radius: 16px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 80px;
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(124,58,237,0.25) 0%, transparent 70%);
    }

    /* ── Header ── */
    header {
      text-align: center;
      margin-bottom: 48px;
      animation: fadeUp 0.6s ease both;
    }
    .badge {
      display: inline-block;
      background: rgba(124,58,237,0.15);
      border: 1px solid rgba(124,58,237,0.4);
      color: var(--accent2);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 100px;
      margin-bottom: 18px;
    }
    h1 {
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 800;
      line-height: 1.15;
      background: linear-gradient(135deg, #f1f0ff 0%, var(--accent2) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle {
      color: var(--muted);
      font-size: 16px;
      margin-top: 12px;
      font-weight: 400;
    }

    /* ── Card ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 36px;
      width: 100%;
      max-width: 700px;
      box-shadow: 0 24px 80px rgba(0,0,0,0.5);
      animation: fadeUp 0.7s ease 0.1s both;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    textarea {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      padding: 14px 16px;
      resize: vertical;
      min-height: 110px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124,58,237,0.2);
    }
    textarea::placeholder { color: var(--muted); }

    .btn-row {
      display: flex;
      gap: 12px;
      margin-top: 18px;
    }

    button {
      flex: 1;
      padding: 13px 24px;
      border-radius: 10px;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, opacity 0.15s, box-shadow 0.2s;
      border: none;
    }
    button:active { transform: scale(0.97); }

    #btn-analyze {
      background: linear-gradient(135deg, var(--accent) 0%, #9f60fb 100%);
      color: #fff;
      box-shadow: 0 4px 24px rgba(124,58,237,0.35);
    }
    #btn-analyze:hover { box-shadow: 0 6px 32px rgba(124,58,237,0.55); opacity: 0.92; }

    #btn-clear {
      background: rgba(255,255,255,0.06);
      color: var(--muted);
      border: 1px solid var(--border);
      flex: 0 0 auto;
      padding: 13px 20px;
    }
    #btn-clear:hover { background: rgba(255,255,255,0.1); color: var(--text); }

    /* ── Results ── */
    #results {
      margin-top: 28px;
      display: none;
      animation: fadeUp 0.4s ease both;
    }

    .result-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 14px;
    }

    .result-text {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 18px;
      font-size: 15px;
      line-height: 1.7;
      color: var(--text);
      margin-bottom: 24px;
    }
    .result-text b {
      color: var(--accent2);
      font-weight: 700;
    }

    .emotion-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
      gap: 12px;
    }

    .emotion-chip {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 12px;
      text-align: center;
      transition: transform 0.2s, border-color 0.2s;
    }
    .emotion-chip.dominant {
      border-color: var(--accent);
      background: rgba(124,58,237,0.12);
      box-shadow: 0 0 0 1px rgba(124,58,237,0.3);
    }
    .emotion-chip .emoji { font-size: 22px; margin-bottom: 6px; }
    .emotion-chip .ename {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .emotion-chip .score {
      font-size: 18px;
      font-weight: 700;
    }
    .emotion-chip[data-emotion="anger"]   .score { color: var(--anger); }
    .emotion-chip[data-emotion="disgust"] .score { color: var(--disgust); }
    .emotion-chip[data-emotion="fear"]    .score { color: var(--fear); }
    .emotion-chip[data-emotion="joy"]     .score { color: var(--joy); }
    .emotion-chip[data-emotion="sadness"] .score { color: var(--sadness); }

    .bar-track {
      width: 100%;
      height: 4px;
      background: rgba(255,255,255,0.08);
      border-radius: 100px;
      margin-top: 6px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 100px;
      transition: width 0.8s cubic-bezier(0.34,1.56,0.64,1);
    }
    .emotion-chip[data-emotion="anger"]   .bar-fill { background: var(--anger); }
    .emotion-chip[data-emotion="disgust"] .bar-fill { background: var(--disgust); }
    .emotion-chip[data-emotion="fear"]    .bar-fill { background: var(--fear); }
    .emotion-chip[data-emotion="joy"]     .bar-fill { background: var(--joy); }
    .emotion-chip[data-emotion="sadness"] .bar-fill { background: var(--sadness); }

    /* ── Error ── */
    .error-box {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.3);
      border-radius: 10px;
      padding: 14px 16px;
      color: #fca5a5;
      font-size: 14px;
      font-weight: 500;
    }

    /* ── Spinner ── */
    .spinner {
      display: none;
      width: 20px; height: 20px;
      border: 2px solid rgba(255,255,255,0.15);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }

    /* ── Footer ── */
    footer {
      margin-top: 48px;
      color: var(--muted);
      font-size: 13px;
      text-align: center;
      animation: fadeUp 0.8s ease 0.2s both;
    }
    footer a { color: var(--accent2); text-decoration: none; }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <header>
    <div class="badge">Watson NLP · AI-Powered</div>
    <h1>Emotion Detector</h1>
    <p class="subtitle">Analyze text for anger, disgust, fear, joy &amp; sadness in real-time.</p>
  </header>

  <div class="card">
    <label for="textToAnalyze">Enter text to analyze</label>
    <textarea
      id="textToAnalyze"
      name="textToAnalyze"
      placeholder="e.g. I am so happy today! This made my week…"
    ></textarea>

    <div class="btn-row">
      <button id="btn-analyze" onclick="analyzeEmotion()">
        <span id="btn-label">Analyze Emotions</span>
        <div class="spinner" id="spinner"></div>
      </button>
      <button id="btn-clear" onclick="clearAll()">Clear</button>
    </div>

    <div id="results">
      <div class="result-label">Analysis Result</div>
      <div class="result-text" id="result-text"></div>

      <div class="result-label">Emotion Breakdown</div>
      <div class="emotion-grid" id="emotion-grid"></div>
    </div>
  </div>

  <footer>
    Powered by <a href="https://www.ibm.com/products/natural-language-processing" target="_blank">IBM Watson NLP</a>
    &nbsp;·&nbsp; Emotion Detector Final Project
  </footer>

  <script>
    const EMOJIS = {
      anger: '😡',
      disgust: '🤢',
      fear: '😨',
      joy: '😄',
      sadness: '😢'
    };

    async function analyzeEmotion() {
      const text = document.getElementById('textToAnalyze').value.trim();
      const btnLabel = document.getElementById('btn-label');
      const spinner = document.getElementById('spinner');
      const resultsDiv = document.getElementById('results');

      if (!text) {
        showError('Please enter some text before analyzing.');
        return;
      }

      // Loading state
      btnLabel.style.display = 'none';
      spinner.style.display = 'block';
      resultsDiv.style.display = 'none';

      try {
        const params = new URLSearchParams({ textToAnalyze: text });
        const response = await fetch('/emotionDetector?' + params.toString());
        const data = await response.text();

        btnLabel.style.display = 'inline';
        spinner.style.display = 'none';

        if (data.startsWith('Invalid text')) {
          showError(data);
          return;
        }

        renderResults(data);
      } catch (err) {
        btnLabel.style.display = 'inline';
        spinner.style.display = 'none';
        showError('Network error – please ensure the server is running.');
      }
    }

    function renderResults(rawText) {
      const resultsDiv = document.getElementById('results');
      const resultText = document.getElementById('result-text');
      const grid = document.getElementById('emotion-grid');

      resultText.innerHTML = rawText;

      // Parse scores from response text
      const scoreRegex = /'(\w+)':\s*([\d.]+)/g;
      const dominantRegex = /dominant emotion is <b>(\w+)<\/b>/;
      const scores = {};
      let match;

      while ((match = scoreRegex.exec(rawText)) !== null) {
        scores[match[1]] = parseFloat(match[2]);
      }

      const domMatch = dominantRegex.exec(rawText);
      const dominant = domMatch ? domMatch[1] : '';

      grid.innerHTML = '';
      ['anger', 'disgust', 'fear', 'joy', 'sadness'].forEach(emotion => {
        const score = scores[emotion] ?? 0;
        const pct = Math.round(score * 100);
        const isDominant = emotion === dominant;

        const chip = document.createElement('div');
        chip.className = 'emotion-chip' + (isDominant ? ' dominant' : '');
        chip.dataset.emotion = emotion;
        chip.innerHTML = `
          <div class="emoji">${EMOJIS[emotion]}</div>
          <div class="ename">${emotion}</div>
          <div class="score">${pct}%</div>
          <div class="bar-track">
            <div class="bar-fill" style="width:0%"></div>
          </div>
        `;
        grid.appendChild(chip);

        // Animate bar fill
        setTimeout(() => {
          chip.querySelector('.bar-fill').style.width = pct + '%';
        }, 50);
      });

      resultsDiv.style.display = 'block';
      resultsDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    function showError(message) {
      const resultsDiv = document.getElementById('results');
      const resultText = document.getElementById('result-text');
      const grid = document.getElementById('emotion-grid');

      resultText.innerHTML = `
        <div class="error-box">
          <span>⚠️</span>
          <span>${message}</span>
        </div>`;
      grid.innerHTML = '';
      resultsDiv.style.display = 'block';
    }

    function clearAll() {
      document.getElementById('textToAnalyze').value = '';
      document.getElementById('results').style.display = 'none';
    }

    // Allow Ctrl+Enter / Cmd+Enter to submit
    document.getElementById('textToAnalyze').addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') analyzeEmotion();
    });
  </script>
</body>
</html>
